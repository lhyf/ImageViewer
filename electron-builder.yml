appId: com.imageviewer.app
productName: ImageViewer
copyright: Copyright © 2026

# The Windows executable's FileDescription — shown in the "Open with" dialog and
# Task Manager — is derived from the package description. Pin it to the product
# name here, without touching the human-readable description in package.json.
extraMetadata:
  description: ImageViewer

directories:
  output: release
  buildResources: build

# Keep everything the runtime needs (out/, prod node_modules, package.json);
# strip source and dev-only config.
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{tailwind.config.js,postcss.config.js,electron-builder.yml}'
  - '!{.eslintrc,.eslintrc.js,.prettierrc,.editorconfig,.gitignore,.npmrc}'
  - '!README.md'
  - '!release/**'
  - '!release-tmp/**'
  - '!dev*.log'

# Native modules + spawned binaries + wasm must live outside the asar.
asarUnpack:
  - '**/*.{node,dll}'
  - 'node_modules/sharp/**'
  - 'node_modules/@img/**'
  # exiftool (RAW preview + metadata) — spawns a real binary at runtime. The
  # platform binary can be hoisted top-level or nested under exiftool-vendored's
  # own node_modules, so unpack the whole tree plus both possible locations.
  - 'node_modules/exiftool-vendored/**'
  - 'node_modules/exiftool-vendored.exe/**'
  - 'node_modules/exiftool-vendored.pl/**'
  # libheif (HEIC decode) loads its .wasm from disk.
  - 'node_modules/libheif-js/**'

artifactName: ImageViewer-${version}-${arch}.${ext}

# Register the app as a real image handler. The NSIS installer writes a ProgId +
# Capabilities entry per type, so Windows treats ImageViewer as a first-class
# default instead of an ad-hoc "Open with" exe. This is what makes "set as
# default" actually stick — notably for PNG, whose system default (Photos)
# otherwise resists the ad-hoc override that JPG happens to accept. (Also feeds
# CFBundleDocumentTypes on macOS.)
fileAssociations:
  - ext: jpg
    name: JPEG Image
    role: Viewer
  - ext: jpeg
    name: JPEG Image
    role: Viewer
  - ext: jfif
    name: JPEG Image
    role: Viewer
  - ext: png
    name: PNG Image
    role: Viewer
  - ext: gif
    name: GIF Image
    role: Viewer
  - ext: webp
    name: WebP Image
    role: Viewer
  - ext: bmp
    name: Bitmap Image
    role: Viewer
  - ext: tif
    name: TIFF Image
    role: Viewer
  - ext: tiff
    name: TIFF Image
    role: Viewer
  - ext: avif
    name: AVIF Image
    role: Viewer
  - ext: ico
    name: Icon
    role: Viewer
  - ext: heic
    name: HEIC Image
    role: Viewer
  - ext: heif
    name: HEIF Image
    role: Viewer
  - ext: cr3
    name: Canon Raw
    role: Viewer
  - ext: cr2
    name: Canon Raw
    role: Viewer
  - ext: nef
    name: Nikon Raw
    role: Viewer
  - ext: arw
    name: Sony Raw
    role: Viewer
  - ext: dng
    name: Digital Negative
    role: Viewer
  - ext: raf
    name: Fujifilm Raw
    role: Viewer
  - ext: orf
    name: Olympus Raw
    role: Viewer
  - ext: rw2
    name: Panasonic Raw
    role: Viewer

win:
  # Skip signing + rcedit: they pull in winCodeSign, whose macOS symlinks cannot
  # be extracted on this Windows account without Developer Mode / elevation.
  # Consequence: the exe keeps Electron's default icon + FileDescription locally.
  # Build with Developer Mode ON (or on CI) to stamp the ImageViewer icon/name.
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
    - target: zip
      arch: [x64]
  icon: build/icon.ico

nsis:
  artifactName: ImageViewer-Setup-${version}-${arch}.${ext}
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ImageViewer
  installerLanguages:
    - zh_CN

portable:
  artifactName: ImageViewer-Portable-${version}-${arch}.${ext}

mac:
  # Ad-hoc sign (no paid Apple Developer ID) so the arm64 app will actually run.
  # Users still clear the download quarantine once — see README "Install" (macOS).
  identity: '-'
  # Do NOT list `arch` here: it overrides the CI `--arm64` / `--x64` flag and
  # cross-builds the other arch, shipping a broken dmg with the wrong-arch native
  # sharp binary. Arch is chosen by the flag in .github/workflows/release.yml.
  target:
    - target: dmg
  category: public.app-category.photography
  # icon: build/icon.icns

dmg:
  title: ImageViewer ${version}
